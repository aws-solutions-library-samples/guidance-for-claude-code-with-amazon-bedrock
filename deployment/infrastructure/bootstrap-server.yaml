# ABOUTME: CloudFormation template for the Claude Desktop Bootstrap Server
# ABOUTME: Deploys an API Gateway HTTP API + Lambda that validates OIDC tokens
# ABOUTME: or IAM (SigV4) auth and returns per-user configuration for Claude Desktop

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Claude Desktop Bootstrap Server — delivers per-user configuration dynamically at sign-in.
  Supports OIDC Bearer auth (JWT validation) and IAM auth (SigV4 for IDC users).
  Returns configuration JSON including inference provider, region, models, and OTEL settings.

Parameters:
  OidcIssuerUrl:
    Type: String
    Description: "OIDC issuer URL (e.g. https://company.okta.com/oauth2/default). Leave empty for IDC-only mode."
    Default: ""

  OidcClientId:
    Type: String
    Description: "OIDC client ID for token audience validation. Leave empty for IDC-only mode."
    Default: ""

  OidcJwksEndpoint:
    Type: String
    Description: "JWKS endpoint URL (optional — auto-discovered from issuer if empty)"
    Default: ""

  DefaultInferenceRegion:
    Type: String
    Description: "Default AWS region for Bedrock inference"
    Default: "us-east-1"

  DefaultInferenceModels:
    Type: String
    Description: "Comma-separated list of allowed model IDs"
    Default: "us.anthropic.claude-sonnet-4-20250514-v1:0"

  OtlpEndpoint:
    Type: String
    Description: "OpenTelemetry collector endpoint URL (optional)"
    Default: ""

  InferenceSessionLifetimeSec:
    Type: Number
    Description: "Session lifetime in seconds before re-authentication reminder"
    Default: 28800
    MinValue: 3600
    MaxValue: 86400

Conditions:
  HasOidcAuth: !Not [!Equals [!Ref OidcIssuerUrl, ""]]
  HasIamAuth: !Equals [!Ref OidcIssuerUrl, ""]

Resources:
  BootstrapFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-bootstrap"
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 10
      MemorySize: 256
      Code:
        ZipFile: |
          # Inline placeholder — real code deployed via package command
          def lambda_handler(event, context):
              return {"statusCode": 500, "body": "Not deployed"}
      Environment:
        Variables:
          OIDC_ISSUER_URL: !Ref OidcIssuerUrl
          OIDC_CLIENT_ID: !Ref OidcClientId
          OIDC_JWKS_ENDPOINT: !Ref OidcJwksEndpoint
          DEFAULT_INFERENCE_REGION: !Ref DefaultInferenceRegion
          DEFAULT_INFERENCE_MODELS: !Ref DefaultInferenceModels
          OTLP_ENDPOINT: !Ref OtlpEndpoint
          INFERENCE_SESSION_LIFETIME_SEC: !Ref InferenceSessionLifetimeSec
      Role: !GetAtt BootstrapFunctionRole.Arn
      Tags:
        - Key: Application
          Value: "claude-code-with-bedrock"
        - Key: Component
          Value: "bootstrap-server"

  BootstrapFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bootstrap-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

  BootstrapApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      Description: "Claude Desktop Bootstrap Server API"
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
        AllowHeaders:
          - Authorization
          - Content-Type
        MaxAge: 3600

  BootstrapApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref BootstrapApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 10

  BootstrapApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BootstrapApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BootstrapFunction.Arn
      PayloadFormatVersion: "2.0"

  BootstrapApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BootstrapApi
      RouteKey: "GET /config"
      Target: !Sub "integrations/${BootstrapApiIntegration}"
      # OIDC mode: no API-level auth (Lambda validates Bearer token itself)
      # IDC mode: AWS_IAM auth (SigV4 — API Gateway validates the signature)
      AuthorizationType: !If [HasOidcAuth, "NONE", "AWS_IAM"]

  # IAM Managed Policy for IDC callers (only created when using IAM auth).
  # IDC permission sets must include this policy to call the bootstrap API.
  BootstrapApiInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: HasIamAuth
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-BootstrapApiInvoke"
      Description: "Allows invoke on the bootstrap API Gateway (required for IDC/IAM-auth callers)"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowBootstrapApiInvoke
            Effect: Allow
            Action: "execute-api:Invoke"
            Resource: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BootstrapApi}/*"

  BootstrapApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BootstrapFunction
      Action: "lambda:InvokeFunction"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BootstrapApi}/*"

Outputs:
  BootstrapUrl:
    Description: "Bootstrap server endpoint URL for MDM bootstrapUrl key"
    Value: !Sub "https://${BootstrapApi}.execute-api.${AWS::Region}.amazonaws.com/config"
    Export:
      Name: !Sub "${AWS::StackName}-BootstrapUrl"

  BootstrapFunctionArn:
    Description: "Bootstrap Lambda function ARN"
    Value: !GetAtt BootstrapFunction.Arn

  BootstrapApiId:
    Description: "API Gateway HTTP API ID"
    Value: !Ref BootstrapApi

  BootstrapApiInvokePolicyArn:
    Condition: HasIamAuth
    Description: "ARN of the managed policy granting execute-api:Invoke (attach to IDC permission sets)"
    Value: !Ref BootstrapApiInvokePolicy
    Export:
      Name: !Sub "${AWS::StackName}-BootstrapApiInvokePolicyArn"
