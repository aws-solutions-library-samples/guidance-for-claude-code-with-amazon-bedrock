AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CloudWatch dashboard and metric filters for Claude CoWork (Claude Desktop) telemetry.
  Reads events from /aws/claude-cowork/events log group and extracts token/cost metrics.

Parameters:
  DashboardName:
    Type: String
    Default: ClaudeCoWorkDashboard
    Description: Name for the CloudWatch dashboard

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where CoWork events are ingested

Resources:
  # CloudWatch Metric Filters — extract metrics from CoWork log events.
  # CoWork emits lam_session_turn_completed events with token counts and cost.
  # These filters create CloudWatch metrics in the ClaudeCoWork namespace.
  # Note: AWS limits MetricTransformations to 1 per filter, so each metric
  # requires its own filter resource.

  InputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-input-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.input
          MetricValue: $.body.attributes.input_tokens
          DefaultValue: 0

  OutputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-output-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.output
          MetricValue: $.body.attributes.output_tokens
          DefaultValue: 0

  CacheReadTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cache-read-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_read
          MetricValue: $.body.attributes.cache_read_input_tokens
          DefaultValue: 0

  CacheCreationTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cache-creation-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_creation
          MetricValue: $.body.attributes.cache_creation_input_tokens
          DefaultValue: 0

  CostMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cost
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: cost.usage
          MetricValue: $.body.attributes.total_cost_usd
          DefaultValue: 0

  SessionCountMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-sessions
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: session.turns
          MetricValue: "1"
          DefaultValue: 0

  # Dashboard — uses the extracted CloudWatch metrics
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": { "markdown": "## CoWork (Claude Desktop) — Telemetry Dashboard\n\nMetrics extracted from CoWork events via CloudWatch Metric Filters on `/aws/claude-cowork/events`.\n\n**Note:** CoWork does not emit per-user identity. All metrics are aggregate across the deployment." }
            },
            {
              "type": "metric",
              "x": 0, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Total Tokens (Input + Output)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.input", {"stat": "Sum", "label": "Input"}],
                  ["ClaudeCoWork", "token.usage.output", {"stat": "Sum", "label": "Output"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 6, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Total Cost (USD)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "cost.usage", {"stat": "Sum", "label": "Cost (USD)"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Session Turns",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "session.turns", {"stat": "Sum", "label": "Turns"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 18, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Cache Hit Tokens",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.cache_read", {"stat": "Sum", "label": "Cache Read"}],
                  ["ClaudeCoWork", "token.usage.cache_creation", {"stat": "Sum", "label": "Cache Creation"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Token Usage Over Time",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.input", {"stat": "Sum", "label": "Input", "period": 3600}],
                  ["ClaudeCoWork", "token.usage.output", {"stat": "Sum", "label": "Output", "period": 3600}],
                  ["ClaudeCoWork", "token.usage.cache_read", {"stat": "Sum", "label": "Cache Read", "period": 3600}]
                ],
                "view": "timeSeries",
                "stacked": true,
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Cost Over Time (USD)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "cost.usage", {"stat": "Sum", "label": "Cost (USD)", "period": 3600}]
                ],
                "view": "timeSeries",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Turns Per Hour",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "session.turns", {"stat": "Sum", "label": "Turns", "period": 3600}]
                ],
                "view": "timeSeries",
                "period": 3600
              }
            },
            {
              "type": "log",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Recent CoWork Events (Raw)",
                "region": "${MetricsRegion}",
                "query": "SOURCE '/aws/claude-cowork/events' | fields @timestamp, body.name, body.attributes.model, body.attributes.input_tokens, body.attributes.output_tokens, body.attributes.total_cost_usd | sort @timestamp desc | limit 20",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardUrl:
    Description: Direct URL to the CoWork CloudWatch dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"
