AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CloudWatch dashboard and metric filters for Claude CoWork (Claude Desktop) telemetry.
  Reads events from /aws/claude-cowork/events log group and extracts token/cost metrics.

Parameters:
  DashboardName:
    Type: String
    Default: ClaudeCoWorkDashboard
    Description: Name for the CloudWatch dashboard

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where CoWork events are ingested

Resources:
  # CloudWatch Metric Filters — extract metrics from CoWork log events.
  # CoWork emits events in two schemas depending on mode:
  #   1. Local Agent Mode: body.name="lam_session_turn_completed", body.attributes.*
  #   2. Claude-Code-for-Desktop: body="claude_code.api_request", attributes.*
  # We create filters for both schemas so the dashboard works regardless of mode.
  # Note: AWS limits MetricTransformations to 1 per filter, so each metric
  # requires its own filter resource.

  # --- Claude-Code-for-Desktop schema (body="claude_code.api_request") ---

  InputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-input-tokens
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.input
          MetricValue: $.attributes.input_tokens
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  OutputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-output-tokens
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.output
          MetricValue: $.attributes.output_tokens
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  CacheReadTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cache-read-tokens
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_read
          MetricValue: $.attributes.cache_read_tokens
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  CacheCreationTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cache-creation-tokens
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_creation
          MetricValue: $.attributes.cache_creation_tokens
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  CostMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-cost
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: cost.usage
          MetricValue: $.attributes.cost_usd
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  SessionCountMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-sessions
      FilterPattern: '{ $.body = "claude_code.api_request" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: session.turns
          MetricValue: "1"
          # NOTE: DefaultValue and Dimensions are mutually exclusive in
          # AWS::Logs::MetricFilter (CloudWatch Logs rejects both together).
          # Dimensions win here for per-user attribution.
          Dimensions:
            - Key: "user_email"
              Value: "$.attributes.user_email"
            - Key: "model"
              Value: "$.attributes.model"

  # --- Local Agent Mode schema (body.name="lam_session_turn_completed") ---
  # These emit to the SAME metric names so both modes contribute to the dashboard.

  LamInputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-input-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.input
          MetricValue: $.body.attributes.input_tokens
          DefaultValue: 0

  LamOutputTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-output-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.output
          MetricValue: $.body.attributes.output_tokens
          DefaultValue: 0

  LamCacheReadTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-cache-read-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_read
          MetricValue: $.body.attributes.cache_read_input_tokens
          DefaultValue: 0

  LamCacheCreationTokenMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-cache-creation-tokens
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: token.usage.cache_creation
          MetricValue: $.body.attributes.cache_creation_input_tokens
          DefaultValue: 0

  LamCostMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-cost
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: cost.usage
          MetricValue: $.body.attributes.total_cost_usd
          DefaultValue: 0

  LamSessionCountMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/claude-cowork/events
      FilterName: cowork-lam-sessions
      FilterPattern: '{ $.body.name = "lam_session_turn_completed" }'
      MetricTransformations:
        - MetricNamespace: ClaudeCoWork
          MetricName: session.turns
          MetricValue: "1"
          DefaultValue: 0

  # Dashboard — uses the extracted CloudWatch metrics
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": { "markdown": "## CoWork (Claude Desktop) — Telemetry Dashboard\n\nMetrics extracted from CoWork events via CloudWatch Metric Filters on `/aws/claude-cowork/events`.\n\n**Note:** CoWork 3P events include a `user.id` attribute (device/installation UUID). Per-device metric dimensions are planned ([#585](https://github.com/aws-solutions-library-samples/guidance-for-claude-code-with-amazon-bedrock/issues/585)). Current metrics are aggregate across the deployment." }
            },
            {
              "type": "metric",
              "x": 0, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Total Tokens (Input + Output)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.input", {"stat": "Sum", "label": "Input"}],
                  ["ClaudeCoWork", "token.usage.output", {"stat": "Sum", "label": "Output"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 6, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Total Cost (USD)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "cost.usage", {"stat": "Sum", "label": "Cost (USD)"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Session Turns",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "session.turns", {"stat": "Sum", "label": "Turns"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 18, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Cache Hit Tokens",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.cache_read", {"stat": "Sum", "label": "Cache Read"}],
                  ["ClaudeCoWork", "token.usage.cache_creation", {"stat": "Sum", "label": "Cache Creation"}]
                ],
                "view": "singleValue",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Token Usage Over Time",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "token.usage.input", {"stat": "Sum", "label": "Input", "period": 3600}],
                  ["ClaudeCoWork", "token.usage.output", {"stat": "Sum", "label": "Output", "period": 3600}],
                  ["ClaudeCoWork", "token.usage.cache_read", {"stat": "Sum", "label": "Cache Read", "period": 3600}]
                ],
                "view": "timeSeries",
                "stacked": true,
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Cost Over Time (USD)",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "cost.usage", {"stat": "Sum", "label": "Cost (USD)", "period": 3600}]
                ],
                "view": "timeSeries",
                "period": 3600
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Turns Per Hour",
                "region": "${MetricsRegion}",
                "metrics": [
                  ["ClaudeCoWork", "session.turns", {"stat": "Sum", "label": "Turns", "period": 3600}]
                ],
                "view": "timeSeries",
                "period": 3600
              }
            },
            {
              "type": "text",
              "x": 0, "y": 18, "width": 24, "height": 1,
              "properties": { "markdown": "## Per-User Breakdown\n*Desktop mode only — LAM events do not emit user_email*" }
            },
            {
              "type": "metric",
              "x": 0, "y": 19, "width": 12, "height": 6,
              "properties": {
                "title": "Top Users by Token Usage",
                "view": "timeSeries",
                "stacked": true,
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(10, sum by (\"user_email\")({\"ClaudeCoWork\", MetricName=\"token.usage.input\"}))", "step": 60 }] }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 19, "width": 12, "height": 6,
              "properties": {
                "title": "Estimated Cost by User (USD)",
                "view": "timeSeries",
                "stacked": true,
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(10, sum by (\"user_email\")({\"ClaudeCoWork\", MetricName=\"cost.usage\"}))", "step": 60 }] }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 25, "width": 12, "height": 6,
              "properties": {
                "title": "Session Turns by User",
                "view": "timeSeries",
                "stacked": true,
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(10, sum by (\"user_email\")({\"ClaudeCoWork\", MetricName=\"session.turns\"}))", "step": 60 }] }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 25, "width": 12, "height": 6,
              "properties": {
                "title": "Cost by Model",
                "view": "timeSeries",
                "stacked": true,
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(10, sum by (\"model\")({\"ClaudeCoWork\", MetricName=\"cost.usage\"}))", "step": 60 }] }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 31, "width": 6, "height": 4,
              "properties": {
                "title": "Active Users",
                "view": "singleValue",
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "count(group by (\"user_email\")({\"ClaudeCoWork\", MetricName=\"session.turns\"}))", "step": 60, "label": "Active Users" }] }
              }
            },
            {
              "type": "log",
              "x": 6, "y": 31, "width": 18, "height": 6,
              "properties": {
                "title": "Recent CoWork Events (Raw)",
                "region": "${MetricsRegion}",
                "query": "SOURCE '/aws/claude-cowork/events' | fields @timestamp, coalesce(body.name, body) as event_name, coalesce(attributes.user_email, body.attributes.user_email) as user_email, coalesce(attributes.user_id, body.attributes.user_id) as device_id, coalesce(body.attributes.model, attributes.model) as model, coalesce(body.attributes.input_tokens, attributes.input_tokens) as input_tokens, coalesce(body.attributes.output_tokens, attributes.output_tokens) as output_tokens, coalesce(body.attributes.total_cost_usd, attributes.cost_usd) as cost_usd | sort @timestamp desc | limit 20",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: Direct URL to the CoWork CloudWatch dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"
