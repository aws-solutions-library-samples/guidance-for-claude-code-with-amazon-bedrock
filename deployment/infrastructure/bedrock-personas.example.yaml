AWSTemplateFormatVersion: '2010-09-09'
Description: Claude Code with Bedrock - Persona-Based Access Control Stack
Parameters:
  AuthStackName:
    Type: String
    Description: Name of the authentication stack that exports <AuthStackName>-OIDCProviderArn
      (imported for the trust policy).
  AllowedBedrockRegions:
    Type: CommaDelimitedList
    Description: AWS regions in which persona roles may invoke Bedrock.
Resources:
  EngineeringPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Bedrock access policy for persona engineering
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowBedrockInvokeAllowedModels
          Effect: Allow
          Action:
          - bedrock:InvokeModel
          - bedrock:InvokeModelWithResponseStream
          - bedrock:CallWithBearerToken
          Resource:
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:inference-profile/*anthropic.*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:application-inference-profile/*anthropic.*
          Condition:
            StringEquals:
              aws:RequestedRegion:
                Ref: AllowedBedrockRegions
        - Sid: AllowBedrockListAndGet
          Effect: Allow
          Action:
          - bedrock:ListFoundationModels
          - bedrock:GetFoundationModel
          - bedrock:ListInferenceProfiles
          - bedrock:GetInferenceProfile
          Resource: '*'
        - Sid: AllowNamespacedPutMetricData
          Effect: Allow
          Action:
          - cloudwatch:PutMetricData
          Resource: '*'
          Condition:
            StringEquals:
              cloudwatch:namespace:
              - ClaudeCode/Bedrock/Usage
              - AWS/Bedrock
  EngineeringRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Persona role for engineering (group eng-team)
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated:
              Fn::ImportValue:
                Fn::Sub: ${AuthStackName}-OIDCProviderArn
          Action:
          - sts:AssumeRoleWithWebIdentity
          - sts:TagSession
          Condition:
            ForAnyValue:StringEquals:
              auth.example.com:groups:
              - eng-team
      ManagedPolicyArns:
      - Ref: EngineeringPolicy
      Tags:
      - Key: Purpose
        Value: Claude Code Persona Access
      - Key: Persona
        Value: engineering
      - Key: PersonaGroup
        Value: eng-team
  SalesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Bedrock access policy for persona sales
      PolicyDocument:
        Version: '2012-10-17'
