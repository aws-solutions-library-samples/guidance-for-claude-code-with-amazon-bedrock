          - bedrock:InvokeModelWithResponseStream
          - bedrock:CallWithBearerToken
          Resource:
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.*haiku*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:inference-profile/*anthropic.*haiku*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:application-inference-profile/*anthropic.*haiku*
          Condition:
