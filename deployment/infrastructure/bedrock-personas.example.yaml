          - Fn::Sub: arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.*opus*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:inference-profile/*anthropic.*sonnet*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:inference-profile/*anthropic.*opus*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:application-inference-profile/*anthropic.*sonnet*
          - Fn::Sub: arn:${AWS::Partition}:bedrock:*:*:application-inference-profile/*anthropic.*opus*
