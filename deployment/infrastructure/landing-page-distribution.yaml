      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # ============================================================
  # IAM Identity Center (SAML-to-OIDC bridge via Cognito)
  # ============================================================
  # Only created when IdPProvider=idc. Mirrors the Federate/Midway pattern in
  # cognito-user-pool-setup.yaml: Cognito hosts the OIDC endpoint ALB needs,
  # while the actual authentication happens via a SAML identity provider
  # (IAM Identity Center) federated into this User Pool.
  IdcUserPool:
    Type: AWS::Cognito::UserPool
    Condition: IsIdc
    Properties:
      UserPoolName: !Sub '${IdentityPoolName}-idc-bridge'
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        Application: ClaudeCodeWithBedrock
        Purpose: IdcLandingPageBridge

  IdcUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: IsIdc
    Properties:
      # Domain prefix must be globally unique, lowercase, and <=63 chars.
      # IdentityPoolName is already constrained to a short, DNS-safe identifier
      # (it's reused as-is for stack names elsewhere), so no truncation needed.
      Domain: !Sub '${IdentityPoolName}-${AWS::AccountId}'
      UserPoolId: !Ref IdcUserPool

  # Web app client used by the ALB's authenticate-oidc action. Starts with only
  # COGNITO as a supported provider; IdcSamlIdentityProvider is added once the
  # SAML metadata URL is available (see IdcUserPoolClientSamlUpdate below).
  IdcUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsIdc
    Properties:
      ClientName: !Sub '${IdentityPoolName}-idc-web-client'
      UserPoolId: !Ref IdcUserPool
      GenerateSecret: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      # Placeholder callback URLs — updated to the real ALB/custom-domain values
      # by IdcCallbackUpdater below, once DistributionALB exists.
      CallbackURLs:
        - 'https://placeholder.example.com/oauth2/idpresponse'
      LogoutURLs:
        - 'https://placeholder.example.com'
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      AuthSessionValidity: 3
      RefreshTokenValidity: 600
      AccessTokenValidity: 10
      IdTokenValidity: 60
      TokenValidityUnits:
        RefreshToken: minutes
        AccessToken: minutes
        IdToken: minutes
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      SupportedIdentityProviders:
        - COGNITO

  # Bootstrap OIDC app client for Claude Desktop's /api/bootstrap flow (see
  # IdcBootstrapRedirectPort above for why this can't reuse IdcUserPoolClient).
  # Public/native client: no secret (GenerateSecret omitted/false — the app
  # is a local binary on the user's machine, PKCE substitutes for a client
  # secret in the authorization-code exchange). Starts with only COGNITO as a
  # supported provider; IAMIdentityCenter is added by
  # IdcBootstrapUserPoolClientSamlUpdate below once the SAML metadata URL is
  # available, same pattern as IdcUserPoolClientSamlUpdate.
  IdcBootstrapUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsIdc
    Properties:
      ClientName: !Sub '${IdentityPoolName}-idc-bootstrap-client'
      UserPoolId: !Ref IdcUserPool
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      # Cognito requires an exact CallbackURLs match (no wildcard ports), and
      # Claude Desktop's PKCE flow uses http (not https) loopback redirects
      # per RFC 8252 — both 127.0.0.1 and localhost forms are registered
      # since Anthropic's docs specify 127.0.0.1 but some OIDC libraries
      # default to localhost.
      CallbackURLs:
        - !Sub 'http://127.0.0.1:${IdcBootstrapRedirectPort}/callback'
        - !Sub 'http://localhost:${IdcBootstrapRedirectPort}/callback'
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      # Longer-lived than the browser client (IdcUserPoolClient): Claude
      # Desktop is a long-running background app, not a browser tab, and
      # requests offline_access-equivalent behavior via refresh token reuse
      # so users aren't re-prompted every few minutes.
      AuthSessionValidity: 3
      RefreshTokenValidity: 43200
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        RefreshToken: minutes
        AccessToken: minutes
        IdToken: minutes
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      SupportedIdentityProviders:
        - COGNITO

  # SAML identity provider for IAM Identity Center. Only created once the SAML
  # metadata URL is known (the SAML app in IDC must be created manually first,
  # using SamlAcsUrl/SamlAudienceUri from this stack's outputs — IAM Identity
  # Center has no API for creating custom SAML applications).
  #
  # IDPSignout: 'true' makes Cognito attempt SAML single logout against IDC's
  # SingleLogoutService endpoint (present in IDC's SAML metadata) when a user
  # hits Cognito's /logout. Left enabled since it's harmless and forward-
  # compatible, but NOTE: AWS Identity Center does not actually act on this —
  # per AWS's own docs (singlesignon/latest/userguide/authconcept.html,
  # "Single logout" section), IDC "doesn't send SAML Single Logout to SAML
  # 2.0 applications that use IAM Identity Center as an identity provider".
  # So this alone does NOT end the IDC-side session. The real fix for that
  # is in handle_logout below, which chains through IDC's supported
  # self-service sign-out URL (https://{store}.awsapps.com/start/#/signout)
  # instead of relying on SLO.
  IdcSamlIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasIdcSamlMetadata
    Properties:
      UserPoolId: !Ref IdcUserPool
      ProviderName: IAMIdentityCenter
      ProviderType: SAML
      ProviderDetails:
        MetadataURL: !Ref IdcSamlMetadataUrl
        IDPSignout: 'true'
      AttributeMapping:
        email: email

  # Adds IAMIdentityCenter to the client's supported providers once the SAML
  # provider exists. Kept as a separate resource (rather than inline on
  # IdcUserPoolClient) because the provider must exist before the client can
  # reference it, and the provider only exists conditionally.
  IdcUserPoolClientSamlUpdate:
    Type: AWS::CloudFormation::CustomResource
    Condition: HasIdcSamlMetadata
    DependsOn:
      - IdcSamlIdentityProvider
      - IdcUserPoolClient
    Properties:
      ServiceToken: !GetAtt IdcClientUpdateFunction.Arn
      UserPoolId: !Ref IdcUserPool
      ClientId: !Ref IdcUserPoolClient
      ProviderName: IAMIdentityCenter
      # Self-healing: IdcUserPoolClient's own SupportedIdentityProviders is
      # hardcoded to [COGNITO] in the template (a deliberate bootstrap
      # value — this custom resource is what adds IAMIdentityCenter on top
      # of it). But a custom resource with otherwise-static properties only
      # re-invokes on its OWN property changes, not on every stack update —
      # so if a later deploy causes CloudFormation to re-issue an Update on
      # the native client resource for any unrelated reason, it silently
      # resets SupportedIdentityProviders back to just [COGNITO], and this
      # custom resource would never notice or re-run to fix it. Forcing a
      # Version tied to DeploymentTimestamp (same pattern as
      # UpdateCognitoCallbackURLs below) makes this run — and re-add
      # IAMIdentityCenter — on every single deploy, so it self-heals instead
      # of silently regressing.
      Version: !Ref DeploymentTimestamp

  # Same as IdcUserPoolClientSamlUpdate, but for the bootstrap client — each
  # Cognito app client independently tracks its own SupportedIdentityProviders,
  # so adding IAMIdentityCenter to IdcUserPoolClient does not affect this one.
  IdcBootstrapUserPoolClientSamlUpdate:
    Type: AWS::CloudFormation::CustomResource
    Condition: HasIdcSamlMetadata
    DependsOn:
      - IdcSamlIdentityProvider
      - IdcBootstrapUserPoolClient
    Properties:
      ServiceToken: !GetAtt IdcClientUpdateFunction.Arn
      UserPoolId: !Ref IdcUserPool
      ClientId: !Ref IdcBootstrapUserPoolClient
      ProviderName: IAMIdentityCenter
      # Self-healing on every deploy — see IdcUserPoolClientSamlUpdate's
      # Version comment above for why this is necessary.
      Version: !Ref DeploymentTimestamp

  IdcClientUpdateRole:
    Type: AWS::IAM::Role
    Condition: IsIdc
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: UpdateCognitoClient
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                Resource:
                  - !GetAtt IdcUserPool.Arn

  IdcClientUpdateFunction:
    Type: AWS::Lambda::Function
    Condition: IsIdc
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: "AWSLambdaBasicExecutionRole (attached via ManagedPolicyArns above) already grants logs:CreateLogGroup/CreateLogStream/PutLogEvents — cfn_nag's static analysis doesn't resolve managed policies referenced through Fn::Sub"
          - id: W89
            reason: "Custom resource Lambda for a one-time Cognito API call — VPC not needed"
          - id: W92
            reason: "One-time custom resource invocation on stack create/update — reserved concurrency unnecessary"
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IdcClientUpdateRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  provider_name = event['ResourceProperties']['ProviderName']

                  cognito = boto3.client('cognito-idp')
                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )
                  client = response['UserPoolClient']

                  providers = client.get('SupportedIdentityProviders', ['COGNITO'])
                  if provider_name not in providers:
                      providers.append(provider_name)

                  update_params = {
                      'UserPoolId': user_pool_id,
                      'ClientId': client_id,
                      'SupportedIdentityProviders': providers,
                  }
                  for key in ['ClientName', 'RefreshTokenValidity', 'AccessTokenValidity',
                              'IdTokenValidity', 'TokenValidityUnits', 'ExplicitAuthFlows',
                              'AllowedOAuthFlows', 'AllowedOAuthScopes', 'CallbackURLs',
                              'LogoutURLs', 'AllowedOAuthFlowsUserPoolClient',
                              'PreventUserExistenceErrors', 'EnableTokenRevocation',
                              'AuthSessionValidity']:
                      if key in client:
                          update_params[key] = client[key]

                  cognito.update_user_pool_client(**update_params)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'Message': 'Client updated'})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Message': str(e)})

  # Retrieves IdcUserPoolClient's auto-generated secret and stores it in
  # Secrets Manager, so the ALB listener's ClientSecret can reference it via a
  # dynamic reference the same way the other IdP branches do. Cognito doesn't
  # expose the client secret as a CFN attribute, hence the custom resource.
  IdcSecretStoreRole:
    Type: AWS::IAM::Role
    Condition: IsIdc
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: CognitoAndSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  - !GetAtt IdcUserPool.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'

  IdcSecretStoreFunction:
    Type: AWS::Lambda::Function
    Condition: IsIdc
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: "AWSLambdaBasicExecutionRole (attached via ManagedPolicyArns above) already grants logs:CreateLogGroup/CreateLogStream/PutLogEvents — cfn_nag's static analysis doesn't resolve managed policies referenced through Fn::Sub"
          - id: W89
            reason: "Custom resource Lambda for a one-time Secrets Manager write — VPC not needed"
          - id: W92
            reason: "One-time custom resource invocation on stack create/update — reserved concurrency unnecessary"
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IdcSecretStoreRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  secret_name = event['ResourceProperties']['SecretName']

                  cognito = boto3.client('cognito-idp')
                  secrets = boto3.client('secretsmanager')

                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )
                  client_secret = response['UserPoolClient'].get('ClientSecret')
                  if not client_secret:
                      raise ValueError("Client does not have a secret (GenerateSecret must be true)")

                  try:
                      secret_response = secrets.create_secret(
                          Name=secret_name,
                          SecretString=client_secret,
                          Description=f"Auto-generated secret for IDC landing page Cognito client {client_id}"
                      )
                      secret_arn = secret_response['ARN']
                  except secrets.exceptions.ResourceExistsException:
                      secrets.update_secret(SecretId=secret_name, SecretString=client_secret)
                      describe_response = secrets.describe_secret(SecretId=secret_name)
                      secret_arn = describe_response['ARN']

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'SecretArn': secret_arn,
                      'SecretName': secret_name
                  })
              except Exception as e:
                  print(f"Error storing client secret: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Message': str(e)})

  IdcUserPoolClientSecret:
    Type: AWS::CloudFormation::CustomResource
    Condition: IsIdc
    Properties:
      ServiceToken: !GetAtt IdcSecretStoreFunction.Arn
      UserPoolId: !Ref IdcUserPool
      ClientId: !Ref IdcUserPoolClient
      SecretName: !Sub '${AWS::StackName}-idc-client-secret'

  # ALB Security Group
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${IdentityPoolName}-landing-page-alb-sg'
      GroupDescription: Security group for distribution landing page ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !If [IsInternalALB, '10.0.0.0/8', '0.0.0.0/0']
          # EC2 security group rule descriptions only allow this charset:
          # a-zA-Z0-9. _-:/()#,@[]+=&;{}!$* — no em dash or other punctuation.
          Description: !If
            - IsInternalALB
            - 'HTTPS from private networks (10.x.x.x) - access via SSM port forwarding or VPN'
            - 'Allow HTTPS from internet (authenticated access)'
      # Explicit egress (rather than relying on the implicit allow-all
      # default) restricted to HTTPS: the ALB's authenticate-oidc action
      # needs outbound 443 to reach the IdP's public token/userInfo
      # endpoints (Cognito, Okta, Azure, Auth0, or IDC's SAML bridge);
      # Lambda target group invocations go through the AWS Lambda service
      # API, not through this security group's egress.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: 'HTTPS outbound to IdP token/userInfo endpoints'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Name
          Value: !Sub '${IdentityPoolName}-landing-page-alb-sg'

  # Application Load Balancer
  DistributionALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: ALBLogsBucketPolicy
    Properties:
      Name: !Sub '${IdentityPoolName}-dist-alb'
      Type: application
      Scheme: !Ref ALBScheme
      SecurityGroups:
        - !Ref ALBSecurityGroup
      # internet-facing ALB nodes need PublicSubnetIds (public IP + direct IGW
      # route). internal ALB nodes have no public IP, so they must sit in
      # NAT-routed private subnets to reach any public endpoint (e.g. an
      # external IdP's OIDC token endpoint during authenticate-oidc) —
      # otherwise the ALB times out trying to complete the OIDC code exchange.
      Subnets: !If [IsInternalALB, !Ref PrivateSubnetIds, !Ref PublicSubnetIds]
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref ALBLogsBucket
        - Key: access_logs.s3.prefix
          Value: 'alb'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Target Group for Lambda
  LambdaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LambdaInvokePermission
    Properties:
      # Name omitted — auto-generated to avoid 32-char limit (issue #86)
      TargetType: lambda
      Targets:
        - Id: !GetAtt LandingPageFunction.Arn
      HealthCheckEnabled: false
      TargetGroupAttributes:
        # /logout needs to clear the (possibly sharded, up to 4 cookies)
        # AWSELBAuthSessionCookie-N set by authenticate-oidc — that requires
        # returning multiple Set-Cookie headers, which only the multi-value
        # response format supports.
        - Key: lambda.multi_value_headers.enabled
          Value: 'true'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Lambda Invoke Permission for ALB
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LandingPageFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*'

  # ACM Certificate (required for HTTPS/OIDC). Skipped when ExistingCertificateArn
  # is provided (see HasExistingCertificate) — the HTTPSListener references
  # whichever one applies via !If below.
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasNoExistingCertificate
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref CustomDomainName
          HostedZoneId: !If [HasRoute53Zone, !Ref HostedZoneId, !Ref AWS::NoValue]
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # HTTPS Listener with OIDC Authentication (REQUIRED - uses custom domain)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref DistributionALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !If [HasExistingCertificate, !Ref ExistingCertificateArn, !Ref Certificate]
      DefaultActions:
        # OIDC Authentication Action
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/v2.0'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}'
                  - !If
                    - IsCognito
                    - !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
                    - !If
                      - IsIdc
                      - !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${IdcUserPool}'
                      - !Ref GenericIssuer
            AuthorizationEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/authorize'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/authorize'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/authorize'
                  - !If
                    - IsCognito
                    - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize'
                    - !If
                      - IsIdc
                      - !Sub 'https://${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize'
                      - !Ref GenericAuthorizationEndpoint
            TokenEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/token'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/token'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/oauth/token'
                  - !If
                    - IsCognito
                    - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
                    - !If
                      - IsIdc
                      - !Sub 'https://${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
                      - !Ref GenericTokenEndpoint
            UserInfoEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/userinfo'
              - !If
                - IsAzure
                - 'https://graph.microsoft.com/oidc/userinfo'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/userinfo'
                  - !If
                    - IsCognito
                    - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/userInfo'
                    - !If
                      - IsIdc
                      - !Sub 'https://${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/userInfo'
                      - !Ref GenericUserInfoEndpoint
            ClientId: !If
              - IsOkta
              - !Ref OktaClientId
              - !If
                - IsAzure
                - !Ref AzureClientId
                - !If
                  - IsAuth0
                  - !Ref Auth0ClientId
                  - !If
                    - IsCognito
                    - !Ref CognitoClientId
                    - !If
                      - IsIdc
                      - !Ref IdcUserPoolClient
                      - !Ref GenericClientId
            ClientSecret: !If
              - IsOkta
              - !Sub '{{resolve:secretsmanager:${OktaClientSecretArn}:SecretString}}'
              - !If
                - IsAzure
                - !Sub '{{resolve:secretsmanager:${AzureClientSecretArn}:SecretString}}'
                - !If
                  - IsAuth0
                  - !Sub '{{resolve:secretsmanager:${Auth0ClientSecretArn}:SecretString}}'
                  - !If
                    - IsCognito
                    - !Sub '{{resolve:secretsmanager:${CognitoClientSecretArn}:SecretString}}'
                    - !If
                      - IsIdc
                      - !Sub '{{resolve:secretsmanager:${IdcUserPoolClientSecret.SecretArn}:SecretString}}'
                      - !Sub '{{resolve:secretsmanager:${GenericClientSecretArn}:SecretString}}'
            SessionTimeout: 43200  # 12 hours
            Scope: 'openid email profile'
            OnUnauthenticatedRequest: authenticate
        # Forward to Lambda
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref LambdaTargetGroup

  # /api/bootstrap listener rule (IdPProvider=idc only): deliberately bypasses
  # the listener's own authenticate-oidc DefaultAction above. Claude Desktop
  # is a background/headless caller, not a browser — it can't follow the
  # ALB's browser-redirect OIDC flow, so it authenticates itself by sending
  # its own "Authorization: Bearer <token>" header (from the separate
  # IdcBootstrapUserPoolClient PKCE flow) directly to this path. The Lambda
  # (handle_bootstrap) validates that token itself via Cognito's userInfo
  # endpoint — see landing-page Lambda code.
  BootstrapApiListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: IsIdc
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - '/api/bootstrap'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref LambdaTargetGroup

  # Route53 record for the custom domain (if custom domain with Route53).
  # Use a CNAME (not an A alias) so the host resolves through the custom
  # domain name rather than the ALB's IP addresses. With an A alias, OIDC
  # callbacks can be sent to/from the resolved IP instead of the configured
  # custom domain, producing a "Callback URL mismatch" error at the IdP.
  #
  # UPGRADE NOTE: earlier versions created an A-alias record named DomainARecord.
  # Renaming the logical ID here makes CloudFormation create this CNAME before
  # deleting the old A record, and Route53 rejects a CNAME that coexists with a
  # same-name A record ("conflicting RRSet"). Existing custom-domain deployments
  # must therefore delete the old Route53 A record for CustomDomainName (or
  # delete/recreate the landing-page stack) before applying this update. Fresh
  # deployments are unaffected. See the PR / docs for the migration steps.
  CustomDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53Zone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: CNAME
      TTL: '300'
      ResourceRecords:
        - !GetAtt DistributionALB.DNSName

  # Lambda function to update Cognito User Pool Client callback URLs.
  # Shared by both IsCognito (existing external Cognito pool) and IsIdc (this
  # stack's own IDC-bridge pool) — the update logic (set callback/logout URLs
  # to the ALB's custom domain) is identical for both, only the target user
  # pool ARN differs.
  CognitoCallbackUpdaterRole:
    Type: AWS::IAM::Role
    Condition: IsCognitoOrIdc
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: UpdateCognitoClient
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  - !If
                    - IsIdc
                    - !GetAtt IdcUserPool.Arn
                    - !Sub 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'

  CognitoCallbackUpdaterFunction:
    Type: AWS::Lambda::Function
    Condition: IsCognitoOrIdc
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CognitoCallbackUpdaterRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client('cognito-idp')

          def handler(event, context):
              logger.info(f"Event: {event}")

              try:
                  request_type = event['RequestType']

                  if request_type == 'Delete':
                      # On stack deletion, don't update callback URLs
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  # Get parameters
                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  custom_domain = event['ResourceProperties']['CustomDomain']

                  # Build callback URLs
                  callback_url = f"https://{custom_domain}/oauth2/idpresponse"
                  logout_url = f"https://{custom_domain}"

                  logger.info(f"Updating Cognito client {client_id} in pool {user_pool_id}")
                  logger.info(f"Callback URL: {callback_url}")
                  logger.info(f"Logout URL: {logout_url}")

                  # Get current client configuration
                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )

                  current_client = response['UserPoolClient']

                  # Update callback URLs while preserving other settings
                  update_params = {
                      'UserPoolId': user_pool_id,
                      'ClientId': client_id,
                      'CallbackURLs': [callback_url],
                      'LogoutURLs': [logout_url]
                  }

                  # Preserve required OAuth settings
                  if 'AllowedOAuthFlows' in current_client:
                      update_params['AllowedOAuthFlows'] = current_client['AllowedOAuthFlows']
                  if 'AllowedOAuthScopes' in current_client:
                      update_params['AllowedOAuthScopes'] = current_client['AllowedOAuthScopes']
                  if 'AllowedOAuthFlowsUserPoolClient' in current_client:
                      update_params['AllowedOAuthFlowsUserPoolClient'] = current_client['AllowedOAuthFlowsUserPoolClient']

                  # Preserve or restore SupportedIdentityProviders
                  if 'SupportedIdentityProviders' in current_client and current_client['SupportedIdentityProviders']:
                      update_params['SupportedIdentityProviders'] = current_client['SupportedIdentityProviders']
                  else:
                      # If missing or null, default to COGNITO (should have been set by Cognito stack)
                      logger.warning("SupportedIdentityProviders is null, setting default to ['COGNITO']")
                      update_params['SupportedIdentityProviders'] = ['COGNITO']

                  cognito.update_user_pool_client(**update_params)

                  logger.info("Successfully updated Cognito client callback URLs")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'CallbackURL': callback_url,
                      'LogoutURL': logout_url
                  })

              except Exception as e:
                  logger.error(f"Error updating Cognito client: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })

  UpdateCognitoCallbackURLs:
    Type: AWS::CloudFormation::CustomResource
    Condition: IsCognitoOrIdc
    DependsOn:
      - DistributionALB
      - HTTPSListener
    Properties:
      ServiceToken: !GetAtt CognitoCallbackUpdaterFunction.Arn
      UserPoolId: !If [IsIdc, !Ref IdcUserPool, !Ref CognitoUserPoolId]
      ClientId: !If [IsIdc, !Ref IdcUserPoolClient, !Ref CognitoClientId]
      CustomDomain: !Ref CustomDomainName
      Version: !Ref DeploymentTimestamp  # Changes on every deployment to force Lambda re-execution

Outputs:
  DistributionURL:
    Description: Landing page URL for downloads (HTTPS with custom domain required)
    Value: !Sub 'https://${CustomDomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-DistributionURL'

  IdPRedirectURI:
    Description: Configure this redirect URI in your IdP web application
    Value: !Sub 'https://${CustomDomainName}/oauth2/idpresponse'
    Export:
      Name: !Sub '${AWS::StackName}-IdPRedirectURI'

  CognitoCallbackStatus:
    Condition: IsCognito
    Description: Cognito User Pool Client callback URLs
    Value: !Sub |
        ✓ Automatically updated!
        Callback URL: https://${CustomDomainName}/oauth2/idpresponse
        Logout URL: https://${CustomDomainName}

        The Cognito web client (${CognitoClientId}) has been automatically configured.
        No manual updates required!

  IdcSamlAcsUrl:
    Condition: IsIdc
    Description: >-
      Application ACS URL — use this when creating the Custom SAML 2.0
      application in IAM Identity Center (Step 1, manual — IDC has no API for
      creating custom SAML apps).
    Value: !Sub 'https://${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/saml2/idpresponse'

  IdcSamlAudienceUri:
    Condition: IsIdc
    Description: Application SAML Audience — use this when creating the SAML application in IAM Identity Center.
    Value: !Sub 'urn:amazon:cognito:sp:${IdcUserPool}'

  IdcUserPoolId:
    Condition: IsIdc
    Description: Cognito User Pool ID for the IDC bridge (needed by `ccwb configure-saml`)
    Value: !Ref IdcUserPool
    Export:
      Name: !Sub '${AWS::StackName}-IdcUserPoolId'

  IdcUserPoolClientId:
    Condition: IsIdc
    Description: >-
      Cognito User Pool Client ID for the IDC bridge. Exported so the separate
      admin-console stack can reuse the same OIDC client for its own ALB
      listener rule (the admin console shares this ALB/listener, it does not
      mint its own Cognito app client).
    Value: !Ref IdcUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-IdcUserPoolClientId'

  IdcBootstrapUserPoolClientId:
    Condition: IsIdc
    Description: >-
      Cognito app client ID for Claude Desktop's bootstrap OIDC flow
      (/api/bootstrap). Exported so the admin-console stack can embed it in
      generated MDM/bootstrap.json files' bootstrapOidc key.
    Value: !Ref IdcBootstrapUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-IdcBootstrapUserPoolClientId'

  IdcBootstrapRedirectPort:
    Condition: IsIdc
    Description: >-
      Fixed loopback port Claude Desktop uses for the bootstrap OIDC callback
      — must match bootstrapOidc.redirectPort in generated MDM files.
    Value: !Ref IdcBootstrapRedirectPort
    Export:
      Name: !Sub '${AWS::StackName}-IdcBootstrapRedirectPort'

  IdcUserPoolDomain:
    Condition: IsIdc
    Description: Cognito User Pool domain prefix for the IDC bridge (used to build OIDC endpoint URLs).
    Value: !Ref IdcUserPoolDomain
    Export:
      Name: !Sub '${AWS::StackName}-IdcUserPoolDomain'

  IdcUserPoolClientSecretArn:
    Condition: IsIdc
    Description: Secrets Manager ARN holding the IdcUserPoolClient's auto-generated secret.
    Value: !GetAtt IdcUserPoolClientSecret.SecretArn
    Export:
      Name: !Sub '${AWS::StackName}-IdcUserPoolClientSecretArn'

  HTTPSListenerArn:
    Description: >-
      ARN of the ALB's HTTPS listener. Exported so the separate admin-console
      stack can attach its own listener rule (path-based routing to a second
      Lambda target group) to this same load balancer/listener instead of
      provisioning a new ALB.
    Value: !Ref HTTPSListener
    Export:
      Name: !Sub '${AWS::StackName}-HTTPSListenerArn'

  ALBSecurityGroupId:
    Description: Security group ID attached to the ALB (informational; the admin console reuses the same ALB, no additional security group needed).
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-ALBSecurityGroupId'

  IdcSamlConfigurationStatus:
    Condition: IsIdc
    Description: Whether the IAM Identity Center SAML provider has been configured
    Value: !If
      - HasIdcSamlMetadata
      - '✓ SAML identity provider configured — sign-in via IAM Identity Center is active.'
      - >-
          ⚠ SAML not yet configured. Create the Custom SAML 2.0 application in
          IAM Identity Center using IdcSamlAcsUrl/IdcSamlAudienceUri above, then
          redeploy with IdcSamlMetadataUrl set to the metadata URL from that
          application (or run `ccwb configure-saml <metadata-url>`).

  DistributionBucket:
    Description: S3 bucket for package uploads
    Value: !Ref DistributionBucket
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucket'

  DistributionBucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt DistributionBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucketArn'
