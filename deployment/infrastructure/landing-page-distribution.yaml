AWSTemplateFormatVersion: '2010-09-09'
Description: 'Authenticated distribution landing page with ALB + Lambda + OIDC + S3'

# ELB access-log service account IDs per region. Older regions require the
# regional account ID on the bucket policy; newer regions (opt-in, launched
# Aug 2022+) and GovCloud use the `logdelivery.elasticloadbalancing.amazonaws.com`
# service principal. The bucket policy below covers both forms so the
# template works in any commercial region.
# Source: https://docs.aws.amazon.com/elasticloadbalancing/latest/application/enable-access-logging.html#attach-bucket-policy
Mappings:
  ELBServiceAccounts:
    us-east-1:      { AccountId: '127311923021' }
    us-east-2:      { AccountId: '033677994240' }
    us-west-1:      { AccountId: '027434742980' }
    us-west-2:      { AccountId: '797873946194' }
    af-south-1:     { AccountId: '098369216593' }
    ca-central-1:   { AccountId: '985666609251' }
    eu-central-1:   { AccountId: '054676820928' }
    eu-west-1:      { AccountId: '156460612806' }
    eu-west-2:      { AccountId: '652711504416' }
    eu-west-3:      { AccountId: '009996457667' }
    eu-south-1:     { AccountId: '635631232127' }
    eu-north-1:     { AccountId: '897822967062' }
    ap-east-1:      { AccountId: '754344448648' }
    ap-northeast-1: { AccountId: '582318560864' }
    ap-northeast-2: { AccountId: '600734575887' }
    ap-northeast-3: { AccountId: '383597477331' }
    ap-southeast-1: { AccountId: '114774131450' }
    ap-southeast-2: { AccountId: '783225319266' }
    ap-southeast-3: { AccountId: '589379963580' }
    ap-south-1:     { AccountId: '718504428378' }
    me-south-1:     { AccountId: '076674570225' }
    sa-east-1:      { AccountId: '507241528517' }
    # GovCloud uses the regional ELB account-ID model (not the service principal).
    # Without these keys the unconditional !FindInMap below fails to resolve and
    # the whole stack errors out in GovCloud.
    us-gov-west-1:  { AccountId: '048591011584' }
    us-gov-east-1:  { AccountId: '190560391635' }

Parameters:
  IdentityPoolName:
    Type: String
    Description: Name prefix for resources (from identity pool name)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for ALB and Lambda

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      Public subnets for the ALB when ALBScheme=internet-facing (minimum 2 AZs).
      Unused when ALBScheme=internal — see PrivateSubnetIds.

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      NAT-routed private subnets for the ALB when ALBScheme=internal (minimum
      2 AZs). An internal ALB's nodes never get a public IP, so without a NAT
      Gateway route they have no path to the internet — needed to reach an
      external IdP's public token endpoint (e.g. Cognito) during
      authenticate-oidc. Pass the same subnets as PublicSubnetIds only if
      those subnets are already NAT-routed; otherwise deploy the networking
      stack with CreateNatGateway=true and use its PrivateSubnetIds output.

  IdPProvider:
    Type: String
    AllowedValues: [okta, azure, auth0, cognito, generic, idc]
    Description: Identity provider type

  # IDC-only: lets the landing page itself show per-group MDM configs
  # (.mobileconfig / .reg / default.json, generated by the separate
  # admin-console stack) instead of the generic flat installer-zip cards
  # every other IdPProvider shows. Unused (and left empty) for non-idc types.
  IdcInstanceArn:
    Type: String
    Default: ''
    Description: >-
      (IdPProvider=idc only) IAM Identity Center instance ARN. Required to
      resolve the signed-in user's group memberships so the landing page can
      show only the per-group MDM configs they're authorized for.

  AdminGroupName:
    Type: String
    Default: 'Claude-Code-Admins'
    Description: >-
      (IdPProvider=idc only) IAM Identity Center group whose members can see
      every group's MDM config on the landing page (matches the admin
      console's AdminGroupName parameter/behavior).

  IdcGroupLookupRegion:
    Type: String
    Default: ''
    Description: >-
      (IdPProvider=idc only) AWS region where the IAM Identity Center
      instance lives, if different from this stack's own region. IDC data
      (groups, users) is only ever stored in its home region. Leave empty to
      default to this stack's own region.

  # Bootstrap OIDC (Claude Desktop dynamic per-user config via /api/bootstrap).
  # Per Anthropic's bootstrap-server docs (separate-identity-provider/PKCE
  # mode: https://claude.com/docs/third-party/claude-desktop/bootstrap),
  # Claude Desktop needs its OWN public/native OAuth client — it can't reuse
  # the browser-login IdcUserPoolClient because that one has a client secret
  # (a desktop app can't keep a secret) and its callback URL is the ALB's
  # /oauth2/idpresponse, not a loopback address. Cognito requires an exact
  # CallbackURLs match (no wildcard ports), so this fixed port must match
  # what's baked into the generated bootstrapOidc.redirectPort MDM key.
  IdcBootstrapRedirectPort:
    Type: Number
    Default: 18765
    Description: >-
      (IdPProvider=idc only) Fixed loopback port Claude Desktop binds for the
      bootstrap OIDC callback (http://127.0.0.1:<port>/callback). Cognito
      requires callback URLs to match exactly, so this must be a port that
      won't commonly conflict with other local services. Common ports in
      the 1024-9999 range (e.g. 8765) can collide with existing local dev
      tools/apps — the default here uses a higher, less-trafficked port, but
      override it per-deployment if you still hit EADDRINUSE.

  # Okta parameters
  OktaDomain:
    Type: String
    Default: ''
    Description: Okta domain (e.g., company.okta.com)

  OktaClientId:
    Type: String
    Default: ''
    Description: Okta web application client ID

  OktaClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Okta client secret

  # Azure AD parameters
  AzureTenantId:
    Type: String
    Default: ''
    Description: Azure AD tenant ID

  AzureClientId:
    Type: String
    Default: ''
    Description: Azure AD web application client ID

  AzureClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Azure client secret

  # Auth0 parameters
  Auth0Domain:
    Type: String
    Default: ''
    Description: Auth0 domain (e.g., company.auth0.com)

  Auth0ClientId:
    Type: String
    Default: ''
    Description: Auth0 web application client ID

  Auth0ClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Auth0 client secret

  # Cognito parameters
  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Cognito User Pool ID

  CognitoUserPoolDomain:
    Type: String
    Default: ''
    Description: Cognito User Pool domain prefix

  CognitoClientId:
    Type: String
    Default: ''
    Description: Cognito web application client ID

  CognitoClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Cognito client secret

  # IAM Identity Center parameters (IdPProvider = idc).
  # IAM Identity Center has no API to create custom SAML applications, so the SAML
  # app itself must be created manually in the IAM Identity Center console after
  # this stack's Cognito User Pool exists (see SamlAcsUrl/SamlAudienceUri outputs).
  # This stack creates its own Cognito User Pool to bridge SAML (IDC) to OIDC (ALB),
  # matching the pattern already used for Federate/Midway in cognito-user-pool-setup.yaml.
  # Note: this stack only needs Cognito's identity bridge, not the IDC instance
  # itself — group/permission-set lookups (which do need IdcInstanceArn) live in
  # the separate admin-console stack.
  IdcSamlMetadataUrl:
    Type: String
    Default: ''
    Description: >-
      SAML metadata URL from the IAM Identity Center application (copied from the
      IDC console after creating the custom SAML 2.0 application). Leave empty on
      first deploy — the SAML app can't exist yet because it needs this stack's
      Cognito User Pool ID first. Re-run the deploy (or use `ccwb configure-saml`)
      once you have this URL to wire up the identity provider.

  ALBScheme:
    Type: String
    Default: 'internet-facing'
    AllowedValues:
      - 'internet-facing'
      - 'internal'
    Description: >-
      Load balancer scheme. Use 'internal' for IAM Identity Center deployments
      tested via SSM port forwarding, or any private-network deployment where
      users connect via VPN, Direct Connect, or internal office networks.
      Default: internet-facing (backwards compatible with existing IdP types).

  # Generic OIDC parameters (PingFederate, Keycloak, ForgeRock, etc.)
  # ALB authenticate-oidc requires each endpoint explicitly because they cannot be
  # derived from a single domain the way the other providers' endpoints can.
  GenericIssuer:
    Type: String
    Default: ''
    Description: Generic OIDC issuer URL (e.g., https://auth.example.com)

  GenericAuthorizationEndpoint:
    Type: String
    Default: ''
    Description: Generic OIDC authorization endpoint (full URL)

  GenericTokenEndpoint:
    Type: String
    Default: ''
    Description: Generic OIDC token endpoint (full URL)

  GenericUserInfoEndpoint:
    Type: String
    Default: ''
    Description: Generic OIDC userinfo endpoint (full URL)

  GenericClientId:
    Type: String
    Default: ''
    Description: Generic OIDC web application client ID

  GenericClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for generic OIDC client secret

  # REQUIRED: Custom domain for HTTPS/OIDC authentication.
  # ALB's HTTPS listener always requires a valid ACM certificate, regardless of
  # ALBScheme — ACM cannot issue certificates for ALB's own *.elb.amazonaws.com
  # DNS name (it's on the public suffix list) or for no domain at all. For
  # ALBScheme=internal test deployments, point this at a domain you own whose
  # Route53 record resolves to the ALB's private IP (only reachable within the
  # VPC or via an SSM port-forwarding tunnel) — ACM DNS validation still
  # succeeds because it validates the hosted zone, not network reachability.
  CustomDomainName:
    Type: String
    Description: 'REQUIRED: Custom domain for landing page (e.g., downloads.example.com). ACM certificate must exist.'
    AllowedPattern: '.+'
    ConstraintDescription: 'Custom domain is required for authenticated landing page.'

  HostedZoneId:
    Type: String
    Default: ''
    Description: '(Optional) Route53 hosted zone ID for automatic DNS configuration.'

  ExistingCertificateArn:
    Type: String
    Default: ''
    Description: >-
      (Optional) ARN of an existing ACM certificate for CustomDomainName. When
      set, this stack uses it directly instead of requesting a new one via DNS
      validation. Use this when CustomDomainName isn't a publicly resolvable,
      Route53-delegated domain — e.g. a private-CA/self-signed certificate
      imported into ACM for an internal-only domain (common for ALBScheme=
      internal test/SSM-tunnel deployments, or orgs using a private CA for
      internal services). Leave empty to have this stack request a new
      DNS-validated public certificate (requires CustomDomainName to be a
      domain you can validate, ideally via HostedZoneId for automatic
      validation-record creation).

  DeploymentTimestamp:
    Type: String
    Default: 'initial'
    Description: Timestamp to force custom resource re-execution on every deployment (auto-populated by deploy command)

Conditions:
  IsOkta: !Equals [!Ref IdPProvider, 'okta']
  IsAzure: !Equals [!Ref IdPProvider, 'azure']
  IsAuth0: !Equals [!Ref IdPProvider, 'auth0']
  IsCognito: !Equals [!Ref IdPProvider, 'cognito']
  IsIdc: !Equals [!Ref IdPProvider, 'idc']
  # Note: 'generic' is the terminal fallback in the AuthenticateOidcConfig !If chains
  # (the else branch after Okta/Azure/Auth0/Cognito/Idc), so no named condition is needed.
  HasRoute53Zone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasExistingCertificate: !Not [!Equals [!Ref ExistingCertificateArn, '']]
  HasNoExistingCertificate: !Equals [!Ref ExistingCertificateArn, '']
  IsInternalALB: !Equals [!Ref ALBScheme, 'internal']
  IsCognitoOrIdc: !Or [!Condition IsCognito, !Condition IsIdc]
  # Explicitly requires IsIdc (not just a non-empty metadata URL) so resources
  # gated on this condition can safely Ref/GetAtt IdcUserPool-family resources,
  # which only exist when IsIdc is true.
  HasIdcSamlMetadata: !And [!Condition IsIdc, !Not [!Equals [!Ref IdcSamlMetadataUrl, '']]]
  HasIdcGroupLookupRegion: !Not [!Equals [!Ref IdcGroupLookupRegion, '']]

Resources:
  # S3 Bucket for package distribution
  DistributionBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${IdentityPoolName}-landing-page-dist-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: LandingPageDistribution

  # S3 Bucket for ALB access logs
  ALBLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${IdentityPoolName}-alb-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: ALBAccessLogs

  # ALB Logs Bucket Policy.
  #
  # Older commercial regions (launched before Aug 2022) require the regional
  # ELB service account as the AWS principal on PutObject. Newer opt-in
  # regions and GovCloud use the logdelivery service principal instead. We
  # grant both so the template is region-portable; S3 simply evaluates
  # whichever the caller happens to match.
  ALBLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWriteRegionalAccount
            Effect: Allow
            Principal:
              AWS: !Sub
                - 'arn:${AWS::Partition}:iam::${AccountId}:root'
                - AccountId: !FindInMap [ELBServiceAccounts, !Ref 'AWS::Region', AccountId]
            Action: s3:PutObject
            Resource: !Sub '${ALBLogsBucket.Arn}/*'
          - Sid: AWSLogDeliveryWriteServicePrincipal
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${ALBLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBLogsBucket.Arn

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectMetadata
                  - s3:ListBucket
                  - s3:HeadObject
                Resource:
                  - !GetAtt DistributionBucket.Arn
                  - !Sub '${DistributionBucket.Arn}/*'
        # IdPProvider=idc only: read-only group-membership lookups so the
        # landing page can resolve which per-group MDM configs (under
        # config/) the signed-in user is authorized to see/download. Same
        # read-only IDC actions the admin-console stack grants its own
        # Lambda — see that template's IdcGroupAndPermissionSetManagement
        # policy comment for why Resource: '*' is used on the
        # identitystore:* actions (the Identity Store ID isn't statically
        # knowable) despite these being scoped, read-only List/Describe
        # actions.
        - !If
          - IsIdc
          - PolicyName: IdcGroupLookup
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: sso:ListInstances
                  Resource: '*'
                - Effect: Allow
                  Action:
                    - identitystore:ListGroups
                    - identitystore:DescribeGroup
                    - identitystore:ListUsers
                    - identitystore:ListGroupMembershipsForMember
                  Resource: '*'
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Lambda CloudWatch Log Group with retention policy
  LandingPageLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${IdentityPoolName}-landing-page'
      RetentionInDays: 30

  # Lambda Function for landing page
  LandingPageFunction:
    Type: AWS::Lambda::Function
    DependsOn: LandingPageLogGroup
    Properties:
      FunctionName: !Sub '${IdentityPoolName}-landing-page'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref DistributionBucket
          # Toggles between the generic flat installer-zip landing page (all
          # other IdPProvider values) and the per-group MDM-config landing
          # page (IdPProvider=idc) — see IdcGroupLookup policy above for why
          # this Lambda needs IDC/SSO read permissions only in the IsIdc case.
          IS_IDC: !If [IsIdc, 'true', 'false']
          IDC_INSTANCE_ARN: !If [IsIdc, !Ref IdcInstanceArn, '']
          ADMIN_GROUP: !If [IsIdc, !Ref AdminGroupName, '']
          IDC_GROUP_LOOKUP_REGION: !If
            - IsIdc
            - !If [HasIdcGroupLookupRegion, !Ref IdcGroupLookupRegion, !Ref 'AWS::Region']
            - ''
          # Cognito's hosted /logout endpoint (used for both IsCognito, an
          # external pool, and IsIdc, this stack's own SAML-bridge pool).
          # Empty for other IdP types — the ALB-native authenticate-oidc
          # action doesn't give targets an id_token, which most non-Cognito
          # IdPs require for IdP-initiated logout, so those fall back to
          # clearing only the local ALB session cookie.
          LOGOUT_URL: !If
            - IsCognito
            - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/logout?client_id=${CognitoClientId}'
            - !If
              - IsIdc
              - !Sub 'https://${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/logout?client_id=${IdcUserPoolClient}'
              - ''
          # /api/bootstrap (IdPProvider=idc only): validates the bearer token
          # Claude Desktop sends (minted by IdcBootstrapUserPoolClient, a
          # separate public/PKCE app client — see that resource's comment)
          # against this same Cognito user pool's userInfo endpoint.
          IDC_COGNITO_DOMAIN: !If
            - IsIdc
            - !Sub '${IdcUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
            - ''
          IDC_BOOTSTRAP_CLIENT_ID: !If [IsIdc, !Ref IdcBootstrapUserPoolClient, '']
      Code:
        ZipFile: |
          # ABOUTME: Lambda function for authenticated distribution landing page
          # ABOUTME: Generates presigned download URLs for authenticated users

          import os
          import json
          import base64
          import urllib.parse
          import urllib.request
          import boto3
          from datetime import datetime, timedelta

          s3_client = boto3.client('s3')
          BUCKET_NAME = os.environ['S3_BUCKET_NAME']
          IS_IDC = os.environ.get('IS_IDC', 'false') == 'true'
          LOGOUT_URL = os.environ.get('LOGOUT_URL', '')
          IDC_INSTANCE_ARN = os.environ.get('IDC_INSTANCE_ARN', '')
          ADMIN_GROUP = os.environ.get('ADMIN_GROUP', 'Claude-Code-Admins')
          IDC_GROUP_LOOKUP_REGION = os.environ.get('IDC_GROUP_LOOKUP_REGION', '')
          IDC_COGNITO_DOMAIN = os.environ.get('IDC_COGNITO_DOMAIN', '')
          IDC_BOOTSTRAP_CLIENT_ID = os.environ.get('IDC_BOOTSTRAP_CLIENT_ID', '')
          PRESIGNED_URL_EXPIRY = 3600  # 1 hour

          sso_admin_client = boto3.client('sso-admin', region_name=IDC_GROUP_LOOKUP_REGION) if IS_IDC else None
          identity_store_client = boto3.client('identitystore', region_name=IDC_GROUP_LOOKUP_REGION) if IS_IDC else None

          def get_header(event, name, default=''):
              """Read a request header from an ALB Lambda-target event,
              regardless of whether the target group has multi-value headers
              enabled. With lambda.multi_value_headers.enabled=true (needed
              here to clear 4 sharded logout cookies in one response), the
              ALB also switches REQUEST headers from 'headers' (plain
              strings) to 'multiValueHeaders' (arrays) — event['headers']
              alone would silently return nothing."""
              multi = event.get('multiValueHeaders')
              if multi:
                  values = multi.get(name) or multi.get(name.lower()) or multi.get(name.title())
                  if values:
                      return values[-1]
                  return default
              headers = event.get('headers', {})
              return headers.get(name) or headers.get(name.lower()) or headers.get(name.title()) or default

          def lambda_handler(event, context):
              """Handle authenticated requests from ALB and generate landing page"""
              import uuid

              try:
                  # Check if this is a documentation request
                  path = event.get('path', '/')
                  if path.startswith('/docs'):
                      return serve_documentation(path)

                  # Handle download redirects via custom domain (avoids Chrome Safe Browsing
                  # warnings that occur when linking directly to s3.amazonaws.com URLs)
                  if path.startswith('/download/'):
                      platform = path.split('/download/', 1)[-1].strip('/')
                      return handle_download(platform)

                  # IdPProvider=idc only: per-group MDM config downloads
                  # (.mobileconfig/.reg/default.json), gated on the caller's
                  # live IDC group membership (see handle_config_download).
                  if IS_IDC and path.startswith('/download-config/'):
                      config_download_id = path.split('/download-config/', 1)[-1].strip('/')
                      user_email = extract_user_email(event)
                      return handle_config_download(config_download_id, user_email)

                  # IdPProvider=idc only: Claude Desktop's dynamic per-user
                  # config poll. Reached via BootstrapApiListenerRule, which
                  # bypasses this listener's own authenticate-oidc — the
                  # caller authenticates itself via its own Bearer token,
                  # validated inside handle_bootstrap.
                  if IS_IDC and path == '/api/bootstrap':
                      return handle_bootstrap(event)

                  if path == '/logout':
                      return handle_logout(event)

                  # Extract user email from ALB authentication headers
                  # ALB has already validated authentication - trust the header
                  user_email = extract_user_email(event)

                  # IdPProvider=idc renders per-group MDM configs instead of
                  # the flat installer-zip cards every other IdP type shows.
                  if IS_IDC:
                      html = generate_landing_page_idc(user_email)
                      return {
                          'statusCode': 200,
                          'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                          'body': html,
                      }

                  # Detect user's OS from User-Agent
                  detected_os = detect_os(event)

                  # List packages in S3
                  packages = list_packages()

                  # Use /download/<platform> paths instead of direct S3 presigned URLs.
                  # This routes downloads through the trusted custom domain, avoiding
                  # Chrome Safe Browsing warnings for s3.amazonaws.com download URLs.
                  download_urls = {}
                  for platform in ['windows', 'linux', 'mac', 'all-platforms']:
                      if platform in packages:
                          download_urls[platform] = f"/download/{platform}"

                  # Get metadata from first available package (prefer windows)
                  metadata_source = packages.get('windows') or packages.get('mac') or packages.get('linux') or packages.get('all-platforms', {})
                  profile = metadata_source.get('profile', 'Unknown')
                  timestamp = metadata_source.get('timestamp', 'Unknown')
                  release_datetime = metadata_source.get('release_datetime', 'Unknown')

                  # Generate HTML page with OS detection
                  html = generate_landing_page(user_email, download_urls, profile, timestamp, release_datetime, packages, detected_os)

                  return {
                      'statusCode': 200,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': html
                  }

              except Exception as e:
                  import traceback
                  error_id = str(uuid.uuid4())

                  # Log full error details to CloudWatch only
                  error_details = traceback.format_exc()
                  print(f"ERROR_ID={error_id}: {error_details}")

                  # Return generic error to user (no sensitive details)
                  return {
                      'statusCode': 500,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': f'<html><body><h1>Error</h1><p>An error occurred while generating the landing page.</p><p>Error ID: {error_id}</p><p>Please contact your IT administrator with this error ID.</p></body></html>'
                  }

          def extract_user_email(event):
              """Extract user email from ALB OIDC headers - ALB has already validated authentication"""
              # Priority 1: Extract email from ALB-verified JWT payload
              # ALB has validated the JWT signature, so we can safely decode the payload
              oidc_data = get_header(event, 'x-amzn-oidc-data')
              if oidc_data:
                  try:
                      parts = oidc_data.split('.')
                      if len(parts) == 3:
                          payload_b64 = parts[1]
                          padding = 4 - len(payload_b64) % 4
                          if padding != 4:
                              payload_b64 += '=' * padding
                          payload = json.loads(base64.b64decode(payload_b64))
                          email = payload.get('email') or payload.get('preferred_username') or payload.get('upn')
                          if email:
                              return email
                  except Exception:
                      pass

              # Priority 2: Fallback to x-amzn-oidc-identity header (may be Cognito sub UUID)
              user_identity = get_header(event, 'x-amzn-oidc-identity')
              if user_identity:
                  return user_identity

              # Default fallback for non-authenticated requests
              return 'authenticated-user@example.com'

          def handle_logout(event):
              """Clear the ALB authenticate-oidc session cookie(s) and show a
              logout confirmation page. Per AWS docs, the ALB shards session
              cookies up to 4 ways (AWSELBAuthSessionCookie-0..3) when they
              exceed 4KB, so all four names are cleared defensively.

              Clearing the ALB/Cognito session alone is NOT a full logout for
              IdPProvider=idc (or any SAML-federated Cognito setup): Cognito
              is only the SAML Service Provider bridging to IAM Identity
              Center — ending the Cognito-side session doesn't end the IDC
              SAML session, so the very next login attempt just silently
              re-authenticates via that still-live IDC session, with no
              credential prompt and no way to switch users. This mirrors the
              original CDK prototype's handle_logout, which surfaces an
              explicit "Sign Out from SSO & Switch User" link to IDC's own
              sign-out portal for that reason.
              """
              base_url = f"https://{get_header(event, 'host')}"
              expired_cookies = [
                  f'AWSELBAuthSessionCookie-{i}=; Path=/; Secure; HttpOnly; SameSite=Lax; Max-Age=0'
                  for i in range(4)
              ]

              sign_in_again_url = base_url
              if LOGOUT_URL:
                  # Also end the Cognito-side session; redirects straight back
                  # to base_url afterward (Cognito's own /logout endpoint).
                  sign_in_again_url = f'{LOGOUT_URL}&logout_uri={urllib.parse.quote(base_url, safe="")}'

              idc_logout_url = ''
              if IS_IDC:
                  try:
                      instances = sso_admin_client.list_instances()
                      if instances.get('Instances'):
                          identity_store_id = instances['Instances'][0].get('IdentityStoreId', '')
                          if identity_store_id:
                              idc_logout_url = f'https://{identity_store_id}.awsapps.com/start/#/signout'
                  except Exception as e:
                      print(f"Error resolving IDC sign-out URL: {e}")

              switch_user_html = f'''<div class="switch-user">
                  <h3>Want to sign in as a different user?</h3>
                  <p class="note">To switch accounts, you need to sign out from IAM Identity Center first:</p>
                  <a href="{idc_logout_url}" class="btn btn-warning" target="_blank" onclick="setTimeout(function(){{ window.location.href='{base_url}'; }}, 2000);">
                      Sign Out from SSO &amp; Switch User
                  </a>
                  <p class="note" style="margin-top: 12px; font-size: 12px;">
                      This opens the IAM Identity Center sign-out page. Once complete, you'll be redirected back to sign in with a different account.
                  </p>
              </div>''' if idc_logout_url else ''

              html = f'''<!DOCTYPE html>
              <html>
              <head>
                  <title>Logged Out</title>
                  <style>
                      body {{ font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }}
                      .logout-box {{ background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; max-width: 450px; }}
                      h2 {{ margin-bottom: 20px; color: #333; }}
                      p {{ color: #666; margin-bottom: 15px; line-height: 1.6; }}
                      .btn {{ display: inline-block; background: #667eea; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 8px 5px; font-size: 14px; }}
                      .btn:hover {{ background: #5a6fd6; }}
                      .btn-warning {{ background: #ff9800; }}
                      .btn-warning:hover {{ background: #f57c00; }}
                      .note {{ font-size: 13px; color: #888; line-height: 1.5; }}
                      .switch-user {{ background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; padding: 16px; margin-top: 20px; }}
                      .switch-user h3 {{ color: #e65100; font-size: 14px; margin: 0 0 10px 0; }}
                  </style>
              </head>
              <body>
                  <div class="logout-box">
                      <h2>Logged Out</h2>
                      <p>You have been logged out of this application.</p>
                      <a href="{sign_in_again_url}" class="btn">Sign In Again</a>
                      {switch_user_html}
                  </div>
              </body>
              </html>'''

              return {
                  'statusCode': 200,
                  'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8'], 'Set-Cookie': expired_cookies},
                  'body': html,
              }

          def detect_os(event):
              """Detect user's operating system from User-Agent header"""
              user_agent = get_header(event, 'user-agent').lower()

              # Check for macOS
              if 'mac' in user_agent or 'darwin' in user_agent:
                  return 'mac'
              # Check for Windows
              elif 'windows' in user_agent or 'win64' in user_agent or 'win32' in user_agent:
                  return 'windows'
              # Check for Linux
              elif 'linux' in user_agent and 'android' not in user_agent:
                  return 'linux'
              # Default to all-platforms if unknown
              else:
                  return None

          def list_packages():
              """List available packages in S3 with metadata"""
              packages = {}

              for platform in ['windows', 'linux', 'mac', 'all-platforms']:
                  try:
                      response = s3_client.head_object(
                          Bucket=BUCKET_NAME,
                          Key=f"packages/{platform}/latest.zip"
                      )
                      metadata = response.get('Metadata', {})
                      packages[platform] = {
                          'size': response['ContentLength'],
                          'profile': metadata.get('profile', 'Unknown'),
                          'timestamp': metadata.get('timestamp', 'Unknown'),
                          'release_date': metadata.get('release_date', metadata.get('release-date', 'Unknown')),
                          'release_datetime': metadata.get('release_datetime', metadata.get('release-date', 'Unknown')),
                      }
                  except s3_client.exceptions.ClientError as e:
                      if e.response['Error']['Code'] != '404':
                          print(f"Error checking {platform}: {e}")

              return packages

          def handle_download(platform):
              """Redirect to presigned S3 URL via custom domain.
              Serving downloads through /download/<platform> keeps presigned URLs
              out of the page HTML and routes the download through the trusted custom
              domain, which avoids Chrome Safe Browsing warnings for s3.amazonaws.com."""
              valid_platforms = ['windows', 'linux', 'mac', 'all-platforms']
              if platform not in valid_platforms:
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>404 - Package Not Found</h1></body></html>'
                  }

              s3_key = f"packages/{platform}/latest.zip"

              # Verify the package exists before redirecting
              try:
                  s3_client.head_object(Bucket=BUCKET_NAME, Key=s3_key)
              except Exception:
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>Package not available</h1><p>No package has been uploaded for this platform yet.</p></body></html>'
                  }

              filename_map = {
                  'windows': 'claude-code-windows-installer.zip',
                  'linux': 'claude-code-linux-installer.zip',
                  'mac': 'claude-code-mac-installer.zip',
                  'all-platforms': 'claude-code-all-platforms-installer.zip',
              }
              filename = filename_map[platform]

              try:
                  url = s3_client.generate_presigned_url(
                      'get_object',
                      Params={
                          'Bucket': BUCKET_NAME,
                          'Key': s3_key,
                          'ResponseContentDisposition': f'attachment; filename="{filename}"',
                          'ResponseContentType': 'application/zip',
                      },
                      ExpiresIn=PRESIGNED_URL_EXPIRY
                  )
                  return {
                      'statusCode': 302,
                      'multiValueHeaders': {'Location': [url]},
                      'body': ''
                  }
              except Exception as e:
                  print(f"Error generating download URL for {platform}: {e}")
                  return {
                      'statusCode': 500,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>Error</h1><p>Could not generate download link.</p></body></html>'
                  }

          # =====================================================================
          # IdPProvider=idc: per-group MDM config listing/download. Mirrors the
          # admin console's own fail-closed group-authorization logic (same
          # config_key <-> IDC group-name matching heuristic) so a user only
          # ever sees/downloads the MDM configs for groups they're actually in,
          # or every group if they're in ADMIN_GROUP.
          # =====================================================================

          def get_user_idc_groups_landing(email):
              """Live lookup of a user's IAM Identity Center group display
              names. Never cached, never trusted from a token claim. Mirrors
              the admin console's own get_user_idc_groups exactly (same
              filtered list_users lookup, same fields) so both Lambdas
              resolve group membership identically."""
              if not email:
                  return []
              try:
                  instances = sso_admin_client.list_instances()
                  if not instances.get('Instances'):
                      return []
                  identity_store_id = instances['Instances'][0]['IdentityStoreId']

                  username = email.split('@')[0] if '@' in email else email
                  users = identity_store_client.list_users(
                      IdentityStoreId=identity_store_id,
                      Filters=[{'AttributePath': 'UserName', 'AttributeValue': username}],
                  )
                  if not users.get('Users'):
                      users = identity_store_client.list_users(
                          IdentityStoreId=identity_store_id,
                          Filters=[{'AttributePath': 'UserName', 'AttributeValue': email}],
                      )
                  if not users.get('Users'):
                      return []

                  user_id = users['Users'][0]['UserId']
                  memberships = identity_store_client.list_group_memberships_for_member(
                      IdentityStoreId=identity_store_id, MemberId={'UserId': user_id}
                  )
                  groups = []
                  for membership in memberships.get('GroupMemberships', []):
                      try:
                          group = identity_store_client.describe_group(
                              IdentityStoreId=identity_store_id,
                              GroupId=membership['GroupId'],
                          )
                          groups.append(group.get('DisplayName', ''))
                      except Exception:
                          pass
                  return groups
              except Exception as e:
                  print(f"Error looking up IDC groups for {email}: {e}")
                  return []

          def _group_name_matches_config_key_landing(config_key, group_name):
              """True if an IDC group display name corresponds to a config_key,
              using the same loose matching the admin console uses when
              deriving config_keys from group names (group_name_to_config_key)."""
              gk = group_name.lower()
              ck = config_key.lower()
              return ck in gk or gk.replace('-', '').replace('_', '') in ck.replace('-', '')

          def get_authorized_config_keys_landing(user_email, all_config_keys):
              """Resolve which config_keys a user is authorized to see/download.
              Fails closed: a user whose IDC group lookup returns nothing is
              authorized for nothing, not everything. Admins (exact ADMIN_GROUP
              match) are authorized for every config_key unconditionally."""
              user_groups = get_user_idc_groups_landing(user_email)
              is_admin = any(ADMIN_GROUP.lower() == g.lower() for g in user_groups)
              if is_admin:
                  return set(all_config_keys), True

              authorized = set()
              for config_key in all_config_keys:
                  if any(_group_name_matches_config_key_landing(config_key, ug) for ug in user_groups):
                      authorized.add(config_key)
              return authorized, False

          def list_config_groups():
              """List per-group MDM config folders under config/ in S3 (admin/
              is reserved for the admin console's own JSON config and is
              excluded). A group is only listed if at least one of its MDM
              files (default.json / Claude.mobileconfig / Claude.reg) exists.

              Model names are read from default.json's inferenceModels
              (already written by the admin console's generate_mdm_configs —
              the same file this Lambda's own downloads serve), rather than
              re-deriving them from live permission-set inline policies the
              way the original CDK prototype did — this avoids extra
              sso-admin/bedrock API calls and IAM permissions the landing
              page doesn't otherwise need.
              """
              groups = {}
              try:
                  response = s3_client.list_objects_v2(Bucket=BUCKET_NAME, Prefix='config/', Delimiter='/')
                  for prefix in response.get('CommonPrefixes', []):
                      config_key = prefix['Prefix'].replace('config/', '').rstrip('/')
                      if config_key == 'admin':
                          continue

                      files = {}
                      for fmt, filename in [('json', 'default.json'), ('macos', 'Claude.mobileconfig'), ('windows', 'Claude.reg')]:
                          try:
                              s3_client.head_object(Bucket=BUCKET_NAME, Key=f"config/{config_key}/{filename}")
                              files[fmt] = True
                          except Exception:
                              pass

                      if not files:
                          continue

                      model_names = []
                      if files.get('json'):
                          try:
                              default_obj = s3_client.get_object(Bucket=BUCKET_NAME, Key=f"config/{config_key}/default.json")
                              default_config = json.loads(default_obj['Body'].read().decode('utf-8'))
                              for m in default_config.get('inferenceModels', []):
                                  if isinstance(m, dict):
                                      model_names.append(m.get('labelOverride') or m.get('name', ''))
                                  else:
                                      model_names.append(str(m))
                              model_names = [m for m in model_names if m]
                          except Exception as e:
                              print(f"Error reading default.json for {config_key}: {e}")

                      groups[config_key] = {
                          'name': config_key.replace('-', ' ').title(),
                          'formats': files,
                          'models': model_names,
                      }
              except Exception as e:
                  print(f"Error listing config groups: {e}")
              return groups

          def verify_idc_bootstrap_access_token(access_token):
              """Verify a bootstrap access token by calling Cognito's own OIDC
              userInfo endpoint (GET /oauth2/userInfo) — the same
              signature/expiry/revocation-checked pattern already used for
              browser sign-in (see the ALB authenticate-oidc action), rather
              than locally decoding an unverified JWT payload. Deliberately
              does not check the token's client_id/aud here: Cognito's
              userInfo endpoint already scopes lookups to the access token's
              own client, so a token minted for a different app client
              within this user pool would simply fail here with a 401 from
              Cognito, not succeed with the wrong identity.
              Returns a dict with 'email', or None if the token is invalid.
              """
              if not access_token or not IDC_COGNITO_DOMAIN:
                  return None
              req = urllib.request.Request(f'https://{IDC_COGNITO_DOMAIN}/oauth2/userInfo', method='GET')
              req.add_header('Authorization', f'Bearer {access_token}')
              try:
                  # URL is built from IDC_COGNITO_DOMAIN (a deploy-time env var
                  # set by our own CFN stack), not from request input — no
                  # attacker-controlled scheme/host.
                  with urllib.request.urlopen(req, timeout=10) as response:  # nosec B310
                      user_attrs = json.loads(response.read().decode('utf-8'))
              except Exception as e:
                  print(f"Bootstrap access token verification failed: {e}")
                  return None
              return {'email': user_attrs.get('email', '')}

          def handle_bootstrap(event):
              """Claude Desktop's dynamic per-user config endpoint
              (bootstrapUrl MDM key). Per Anthropic's bootstrap-server docs
              (https://claude.com/docs/third-party/claude-desktop/bootstrap):
              validate the bearer token, authorize the caller against IDC
              group membership (not just authenticate them), and return only
              the bootstrap-settable keys — omitted keys are treated as
              unset by Claude Desktop, not inherited from MDM, so every
              feature toggle the admin console wrote to bootstrap.json is
              already explicit there.
              """
              auth_header = get_header(event, 'authorization')
              if not auth_header.startswith('Bearer '):
                  return {
                      'statusCode': 401,
                      'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                      'body': json.dumps({'error': 'invalid_token'}),
                  }
              access_token = auth_header[len('Bearer '):]

              user_info = verify_idc_bootstrap_access_token(access_token)
              user_email = user_info.get('email', '') if user_info else ''
              if not user_email:
                  return {
                      'statusCode': 401,
                      'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                      'body': json.dumps({'error': 'invalid_token'}),
                  }

              config_groups = list_config_groups()
              authorized_keys, is_admin = get_authorized_config_keys_landing(user_email, config_groups.keys())
              if not authorized_keys:
                  # Valid caller, but not entitled to any published config —
                  # 403 per Anthropic's docs (not 401: the token itself is fine).
                  return {
                      'statusCode': 403,
                      'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                      'body': json.dumps({'error': 'not_entitled'}),
                  }

              # A user could technically be authorized for multiple groups (the
              # matching heuristic is loose); bootstrap can only return one
              # profile, so prefer the same config_key ordering list_config_groups
              # produced (S3 listing order) and take the first authorized match.
              config_key = next((k for k in config_groups if k in authorized_keys), None)
              if not config_key:
                  return {
                      'statusCode': 403,
                      'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                      'body': json.dumps({'error': 'not_entitled'}),
                  }

              try:
                  response = s3_client.get_object(Bucket=BUCKET_NAME, Key=f"config/{config_key}/bootstrap.json")
                  bootstrap_config = json.loads(response['Body'].read().decode('utf-8'))
              except Exception as e:
                  print(f"Error loading bootstrap config for {config_key}: {e}")
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                      'body': json.dumps({'error': 'not_found'}),
                  }

              # bootstrapUrl/bootstrapOidc/bootstrapEnabled are structurally
              # excluded by Claude Desktop itself if returned (the trust
              # anchor cannot redirect itself) — stripped here too so the
              # response only ever contains keys Desktop will actually apply.
              bootstrap_config.pop('bootstrapUrl', None)
              bootstrap_config.pop('bootstrapOidc', None)
              bootstrap_config.pop('bootstrapEnabled', None)
              bootstrap_config.pop('_configKey', None)
              bootstrap_config.pop('_version', None)

              import time
              bootstrap_config['expiresAt'] = int(time.time()) + 3600

              return {
                  'statusCode': 200,
                  'multiValueHeaders': {'Content-Type': ['application/json'], 'Cache-Control': ['no-store']},
                  'body': json.dumps(bootstrap_config),
              }

          def handle_config_download(config_download_id, user_email):
              """Serve a presigned download URL for a group's MDM config file.
              Requires that the caller is authorized for the specific
              config_key requested — either as an admin, or as a member of the
              corresponding IDC group. This prevents any authenticated user
              from downloading every other group's MDM profile (which contains
              AWS account ID, IDC SSO details, bootstrap OIDC client config,
              and tool/MCP policies) just by guessing config_keys."""
              parts = config_download_id.rsplit('-', 1)
              if len(parts) != 2:
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>File not available</h1></body></html>'
                  }

              config_key, fmt = parts
              format_map = {
                  'json': ('default.json', f'{config_key}-config.json', 'application/json'),
                  'macos': ('Claude.mobileconfig', f'Claude-{config_key}.mobileconfig', 'application/x-apple-aspen-config'),
                  'windows': ('Claude.reg', f'Claude-{config_key}.reg', 'text/plain'),
              }
              if fmt not in format_map:
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>File not available</h1></body></html>'
                  }

              authorized_keys, _is_admin = get_authorized_config_keys_landing(user_email, [config_key])
              if config_key not in authorized_keys:
                  return {
                      'statusCode': 403,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>Access Denied</h1><p>You are not authorized to download this configuration.</p></body></html>'
                  }

              file_name, download_name, content_type = format_map[fmt]
              # download_name embeds config_key in a Content-Disposition header
              # value; strip characters that could break out of the quoted filename.
              download_name = download_name.replace('"', '').replace('\r', '').replace('\n', '')
              s3_key = f"config/{config_key}/{file_name}"
              try:
                  s3_client.head_object(Bucket=BUCKET_NAME, Key=s3_key)
                  url = s3_client.generate_presigned_url(
                      'get_object',
                      Params={
                          'Bucket': BUCKET_NAME,
                          'Key': s3_key,
                          'ResponseContentDisposition': f'attachment; filename="{download_name}"',
                          'ResponseContentType': content_type,
                      },
                      ExpiresIn=PRESIGNED_URL_EXPIRY
                  )
                  return {
                      'statusCode': 302,
                      'multiValueHeaders': {'Location': [url]},
                      'body': ''
                  }
              except Exception as e:
                  print(f"Error downloading {s3_key}: {e}")
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>File not available</h1></body></html>'
                  }

          def generate_landing_page_idc(user_email):
              """Generate the IDC landing page: per-group MDM config cards
              (macOS/Windows/JSON), filtered to only the groups the caller is
              authorized for (or all groups, if the caller is an admin)."""
              import html as html_module
              esc_email = html_module.escape(user_email)

              config_groups = list_config_groups()
              authorized_keys, is_admin = get_authorized_config_keys_landing(user_email, config_groups.keys())
              user_config_groups = {k: v for k, v in config_groups.items() if k in authorized_keys}

              group_cards = []
              for config_key, group_info in user_config_groups.items():
                  buttons = []
                  formats = group_info.get('formats', {})
                  labels = {'macos': 'macOS (.mobileconfig)', 'windows': 'Windows (.reg)', 'json': 'JSON (manual setup)'}
                  for fmt in ['macos', 'windows', 'json']:
                      if formats.get(fmt):
                          buttons.append(f'<a href="/download-config/{config_key}-{fmt}" class="download-btn">{labels[fmt]}</a>')
                  if buttons:
                      models_html = ''
                      model_names = group_info.get('models', [])
                      if model_names:
                          model_items = ''.join(f'<div class="model-item">{html_module.escape(m)}</div>' for m in model_names)
                          models_html = f'''
                          <div class="card-models">
                              <div class="models-label">Available Models:</div>
                              {model_items}
                          </div>'''
                      group_cards.append(f'''
                      <div class="config-card">
                          <div class="card-header">
                              <h3>{html_module.escape(group_info.get("name", config_key))}</h3>
                          </div>{models_html}
                          <div class="card-body">
                              <p>Download the Claude Desktop configuration profile for your platform:</p>
                              <div class="download-buttons">{''.join(buttons)}</div>
                          </div>
                      </div>''')

              no_configs_msg = f'''<div class="empty-state">
                  <h3>No Configurations Available</h3>
                  <p>{"No group configurations have been published yet. As an admin, use the " if is_admin else "You are not yet assigned a Claude Desktop configuration. Ask your administrator to add you to the appropriate IAM Identity Center group and use the "}<a href="/admin">Admin Console</a>{" to configure group/model mappings and click Deploy." if is_admin else " to publish configurations."}</p>
              </div>''' if not group_cards else ''

              admin_nav = '''<a class="nav-item" href="/admin">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                  Admin Console
              </a>''' if is_admin else ''

              return f'''
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
