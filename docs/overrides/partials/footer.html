<footer class="md-footer">
  {% if page.previous_page or page.next_page %}
  <nav class="md-footer__inner md-grid" aria-label="Footer" style="background: transparent;">
    {% if page.previous_page %}
    <a href="{{ page.previous_page.url | url }}" class="md-footer__link md-footer__link--prev" style="color: #141413;">
      <div class="md-footer__title">
        <span class="md-footer__direction">Previous</span>
        {{ page.previous_page.title }}
      </div>
    </a>
    {% endif %}
    {% if page.next_page %}
    <a href="{{ page.next_page.url | url }}" class="md-footer__link md-footer__link--next" style="color: #141413;">
      <div class="md-footer__title">
        <span class="md-footer__direction">Next</span>
        {{ page.next_page.title }}
      </div>
    </a>
    {% endif %}
  </nav>
  {% endif %}
  <div class="md-footer-meta md-typeset" style="background-color: transparent;">
    <div class="md-footer-meta__inner md-grid" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; padding: 2.5rem 0 2rem;">
      <img src="{{ 'assets/images/aws-logo.svg' | url }}" alt="AWS" style="height: 18px; width: auto; opacity: 0.4;">
      <span style="color: #141413; opacity: 0.35; font-size: 0.65rem;">Claude Code with Amazon Bedrock</span>
    </div>
  </div>
</footer>
