name: cfn_nag
on:
  push:
    branches: ["main", "beta"]
  pull_request:
    branches: ["main", "beta"]
  workflow_dispatch:
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: cfn_nag scan
        uses: stelligent/cfn_nag@8b5f03da74202ba323a145e9d037ddce6cab9dec
        with:
          input_path: deployment/infrastructure
          extra_args: -o sarif -g
          output_path: cfn_nag.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675
        if: success() || failure()
        with:
          sarif_file: cfn_nag.sarif
